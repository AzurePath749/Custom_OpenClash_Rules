name: Modify Config Files

on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''
  push:
    paths:
      - 'cfg/**/*.ini'
    branches: [ main ]
  workflow_dispatch:

jobs:
  modify-configs:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      
      - name: Create output directory
        run: mkdir -p cfg_modified
      
      - name: Check if INI files exist
        id: check_files
        run: |
          echo "🔍 Checking for INI files in cfg directory..."
          
          file_count=$(find cfg -name "*.ini" -type f 2>/dev/null | wc -l)
          echo "file_count=$file_count" >> $GITHUB_OUTPUT
          
          if [ "$file_count" -eq 0 ]; then
            echo "⚠️ No INI files found in cfg/"
            echo "⚠️ Skipping modification..."
            exit 0
          else
            echo "✅ Found $file_count INI file(s)"
          fi
      
      - name: Process INI files
        if: steps.check_files.outputs.file_count != '0'
        run: |
          echo "🔄 Processing INI files..."
          
          # 使用临时文件存储统计信息
          echo "0" > /tmp/total_count
          echo "0" > /tmp/failed_count
          
          # 遍历 cfg 目录下的所有 .ini 文件
          while IFS= read -r file; do
            echo "📄 Processing: $file"
            
            # 获取文件名（不含路径）
            filename=$(basename "$file")
            output_file="cfg_modified/$filename"
            
            # 创建临时文件
            temp_file=$(mktemp)
            
            # 替换测速地址
            sed 's|https://www\.gstatic\.com/generate_204|https://www.apple.com/library/test/success.html|g' "$file" > "$temp_file"
            
            # 替换 _Classical.yaml 为 _Classical_IP.yaml
            sed -i 's/_Classical\.yaml/_Classical_IP.yaml/g' "$temp_file"
            
            # 保存到输出目录，保持原文件名
            if cp "$temp_file" "$output_file"; then
              file_size=$(ls -lh "$output_file" | awk '{print $5}')
              echo "   ✅ Success (size: $file_size)"
              total=$(cat /tmp/total_count)
              echo $((total + 1)) > /tmp/total_count
            else
              echo "   ⚠️ Failed: could not save output file"
              failed=$(cat /tmp/failed_count)
              echo $((failed + 1)) > /tmp/failed_count
            fi
            
            # 清理临时文件
            rm "$temp_file"
            echo ""
          done < <(find cfg -name "*.ini" -type f)
          
          # 读取最终统计
          total=$(cat /tmp/total_count)
          failed=$(cat /tmp/failed_count)
          
          echo "🎉 Conversion complete!"
          echo "   ✅ Successfully processed: $total files"
          [ $failed -gt 0 ] && echo "   ⚠️ Failed: $failed files"
          
          # 显示生成的文件列表
          if [ $total -gt 0 ]; then
            echo ""
            echo "📋 Modified files:"
            find cfg_modified -name "*.ini" -type f | sort
            echo ""
            echo "📊 Total size:"
            du -sh cfg_modified
          fi
          
          # 清理临时文件
          rm -f /tmp/total_count /tmp/failed_count
      
      - name: Upload modified configs
        if: steps.check_files.outputs.file_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: modified-config-files
          path: cfg_modified/
          retention-days: 30
      
      - name: Commit and push changes
        if: steps.check_files.outputs.file_count != '0'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cfg_modified
          git commit -m "Auto-modify: Update test URLs and rename Classical files" || echo "No changes to commit."
          
          echo "🔄 Pulling latest changes from remote before push..."
          # 防止远程先更新导致 push 被拒绝
          git pull --rebase origin "${TARGET_BRANCH}" || true
          
          echo "🚀 Pushing changes to ${TARGET_BRANCH}..."
          git push origin HEAD:"${TARGET_BRANCH}" || {
            echo "❌ Push failed after rebase attempt, retrying with force-with-lease..."
            git push origin HEAD:"${TARGET_BRANCH}" --force-with-lease
          }