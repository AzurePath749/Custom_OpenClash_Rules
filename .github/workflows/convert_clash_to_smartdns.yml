name: Convert Clash Lists to SmartDNS

on:
  schedule:
    # 每天 UTC 时间 02:00 自动运行（北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:  # 支持手动触发
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''

jobs:
  convert:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
      UPSTREAM_REPO: "Aethersailor/Custom_OpenClash_Rules"
      UPSTREAM_BRANCH: "main"
    steps:
      # 1️⃣ 检出仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      # 2️⃣ 检查上游仓库是否有更新（使用 jq）
      - name: Check upstream updates
        id: check_upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Checking upstream repository updates..."
          
          # 使用 jq 解析 GitHub API 返回的 JSON
          UPSTREAM_SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$UPSTREAM_REPO/commits/$UPSTREAM_BRANCH" | \
            jq -r '.sha // empty')
          
          if [ -z "$UPSTREAM_SHA" ]; then
            echo "⚠️ Failed to fetch upstream SHA, will proceed with conversion"
            echo "needs_update=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📌 Upstream SHA: $UPSTREAM_SHA"
          
          # 检查本地记录的上游 SHA
          if [ -f ".upstream_sha_smartdns" ]; then
            LOCAL_SHA=$(cat .upstream_sha_smartdns)
            echo "📌 Local SHA: $LOCAL_SHA"
            
            if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
              echo "✅ No updates from upstream, skipping conversion"
              echo "needs_update=false" >> $GITHUB_OUTPUT
            else
              echo "🔄 Upstream has updates, will convert"
              echo "needs_update=true" >> $GITHUB_OUTPUT
              echo "$UPSTREAM_SHA" > .upstream_sha_smartdns
            fi
          else
            echo "🆕 First run, will convert"
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "$UPSTREAM_SHA" > .upstream_sha_smartdns
          fi

      # 3️⃣ 下载上游规则文件（使用 sparse-checkout 优化）
      - name: Download upstream rules
        if: steps.check_upstream.outputs.needs_update == 'true'
        run: |
          echo "📥 Downloading rules from $UPSTREAM_REPO (sparse checkout)..."
          
          mkdir -p upstream_temp
          cd upstream_temp
          
          # 使用 sparse-checkout 只克隆 rule 目录
          git init
          git remote add origin "https://github.com/$UPSTREAM_REPO.git"
          git config core.sparseCheckout true
          
          # 只检出 rule 目录
          echo "rule/*" >> .git/info/sparse-checkout
          
          echo "⬇️ Pulling rule directory..."
          git pull --depth=1 origin "$UPSTREAM_BRANCH"
          
          cd ..
          
          if [ -d "upstream_temp/rule" ]; then
            echo "✅ Rules downloaded successfully"
            echo ""
            echo "📊 Available .list files:"
            file_count=$(find upstream_temp/rule -type f -name "*.list" | wc -l)
            echo "   Total: $file_count files"
            find upstream_temp/rule -type f -name "*.list" | head -n 10
            [ $file_count -gt 10 ] && echo "   ..."
          else
            echo "❌ Failed to download rules"
            exit 1
          fi

      # 4️⃣ 转换为 SmartDNS 格式（简化版 - 不用 export）
      - name: Convert Clash list files to SmartDNS format
        if: steps.check_upstream.outputs.needs_update == 'true'
        shell: bash
        run: |
          mkdir -p rule_converted_smartdns
          
          echo "📋 Found .list files to convert:"
          find upstream_temp/rule -type f -name "*.list"
          echo ""
          
          total_count=0
          success_count=0
          
          # 使用 while 循环处理每个文件
          while IFS= read -r file; do
            base_name=$(basename "${file%.list}")
            output="rule_converted_smartdns/${base_name}_smartdns.txt"
            
            echo "🔄 Converting: $base_name"
            
            # AWK 转换 - 直接内联，不使用函数
            awk '
              BEGIN { 
                IGNORECASE=1
                suf=0; key=0; dom=0; full=0
              }
              # full: 精确匹配
              /^full:/ {
                sub(/^full:/, "");
                print $0;
                full++;
                next
              }
              # DOMAIN-SUFFIX
              /^DOMAIN-SUFFIX/ {
                split($0,a,",");
                print a[2];
                suf++;
                next
              }
              # DOMAIN-KEYWORD
              /^DOMAIN-KEYWORD/ {
                split($0,a,",");
                print "*-"a[2]".*";
                key++;
                next
              }
              # DOMAIN（精确）
              /^DOMAIN,/ {
                split($0,a,",");
                print "-."a[2];
                dom++;
                next
              }
              # 跳过其他所有内容
              {next}
              END {
                total = suf + key + dom + full
                if (total > 0) {
                  printf("   📊 SUF=%d KEY=%d DOM=%d FULL=%d Total=%d\n", suf, key, dom, full, total) > "/dev/stderr"
                }
              }
            ' "$file" 2>&1 | sort -u > "$output"
            
            total_count=$((total_count + 1))
            
            if [ -s "$output" ]; then
              lines=$(wc -l < "$output")
              echo "   ✅ Success: $lines unique domains"
              success_count=$((success_count + 1))
            else
              echo "   ⚠️ Warning: no output generated"
            fi
            echo ""
          done < <(find upstream_temp/rule -type f -name "*.list")
          
          echo "🎉 Conversion summary:"
          echo "   📁 Total files: $total_count"
          echo "   ✅ Successful: $success_count"
          echo "   ⚠️ Failed: $((total_count - success_count))"
          
          if [ "$success_count" -eq 0 ]; then
            echo ""
            echo "❌ No files converted successfully"
            exit 1
          fi
          
          echo ""
          echo "📋 Generated files:"
          ls -lh rule_converted_smartdns/ 2>/dev/null || echo "None"

      # 5️⃣ 清理临时文件
      - name: Clean up temporary files
        if: steps.check_upstream.outputs.needs_update == 'true'
        run: |
          rm -rf upstream_temp
          echo "🧹 Temporary files cleaned up"

      # 6️⃣ 提交并推送结果
      - name: Commit and push SmartDNS lists
        if: steps.check_upstream.outputs.needs_update == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .upstream_sha_smartdns rule_converted_smartdns
          
          if git diff --staged --quiet; then
            echo "📝 No changes detected, skipping commit"
          else
            total=$(find rule_converted_smartdns -type f -name "*.txt" 2>/dev/null | wc -l)
            
            git commit -m "chore: convert Clash lists to SmartDNS format" \
                       -m "Converted: $total files" \
                       -m "Source: $UPSTREAM_REPO@$UPSTREAM_BRANCH" \
                       -m "Upstream SHA: $(cat .upstream_sha_smartdns)" \
                       -m "Updated: $(date +'%Y-%m-%d %H:%M:%S UTC')"
            
            echo "🔄 Pulling latest changes from remote..."
            git pull --rebase origin "${TARGET_BRANCH}" || true
            
            echo "🚀 Pushing changes to ${TARGET_BRANCH}..."
            git push origin HEAD:"${TARGET_BRANCH}" || {
              echo "⚠️ Push failed, retrying with force-with-lease..."
              git push origin HEAD:"${TARGET_BRANCH}" --force-with-lease
            }
            
            echo "✅ Changes pushed successfully!"
          fi
            
            echo "✅ Changes pushed successfully!"
          fi


